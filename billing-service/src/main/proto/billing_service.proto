syntax = "proto3";

option java_multiple_files = true;
option java_pakage = "billing";
option java_outerclass_name = "BillingProto";

service BillingService {
  rpc CreateBillingAccount(BillingRequest) returns (BillingResponce);
}

message BillingRequest {
  string patientId = 1;
  string name = 2;
  string email = 3;
}

message BillingResponce {
  string accountId = 1;
  string statue = 2;
}